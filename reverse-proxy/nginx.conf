# Single-origin HTTPS (spec §5.7): Frontend = /, API = /api/
# TLS terminated here with an mkcert-issued, locally-trusted certificate.
upstream frontend { server host.docker.internal:5173; keepalive 32; }
upstream backend  { server host.docker.internal:8080; keepalive 32; }

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
  listen 80;
  server_name homeops.localhost;
  return 301 https://$host$request_uri;     # always steer to HTTPS
}

server {
  listen 443 ssl;
  http2 on;
  server_name homeops.localhost;

  ssl_certificate     /etc/nginx/certs/homeops.localhost.pem;
  ssl_certificate_key /etc/nginx/certs/homeops.localhost-key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  client_max_body_size 16m;                 # HomeOps never proxies file bytes (spec §3.6/§5.7)

  # Security headers (spec §7.4). `always` so they ride on error responses too.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # Dev-permissive CSP: 'unsafe-inline'/'unsafe-eval' + ws: keep Vite HMR working and
  # cdn.redoc.ly + blob: keep the ReDoc page working. In prod, drop 'unsafe-eval',
  # tighten script-src to 'self' (hashed/nonced) and remove the redoc/ws allowances.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.redoc.ly; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

  location = /api { return 301 /api/; }     # bare /api → /api/

  location /api/ {                          # API → backend
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://backend;
  }

  location / {                              # everything else → frontend (+ Vite HMR WebSocket)
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://frontend;
  }
}
